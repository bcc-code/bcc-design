<link rel="stylesheet" href="https://design.bcc.no/fonts/stylesheet.css">
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,500,1,0" />
<style>
  body, .sbdocs-content, .docs-story {
    font-family: 'Archivo', sans-serif !important;
  }


  /* Lightbox */
  .lightbox-overlay {
    display: none;
    position: fixed;
    inset: 0;
    z-index: 9999;
    background: var(--color-blanket-default);
    align-items: center;
    justify-content: center;
    cursor: zoom-out;
  }
  .lightbox-overlay.active {
    display: flex;
  }
  .lightbox-overlay img {
    max-width: 90vw;
    max-height: 90vh;
    border-radius: 8px;
    box-shadow: var(--shadow-overlay);
  }
  .lightbox-trigger {
    cursor: zoom-in;
  }

  /* Copy toast */
  .copy-toast {
    position: fixed;
    bottom: 24px;
    left: 50%;
    transform: translateX(-50%);
    background: #1e1f21;
    color: #fff;
    font-size: 13px;
    font-family: 'Archivo', monospace;
    padding: 8px 16px;
    border-radius: 8px;
    z-index: 10000;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.15s;
  }
  .copy-toast.show {
    opacity: 1;
  }

  /* Clickable color swatches */
  .color-swatch {
    cursor: pointer;
    transition: transform 0.25s cubic-bezier(0.2, 0, 0, 1), box-shadow 0.25s cubic-bezier(0.2, 0, 0, 1);
  }
  .color-swatch:hover {
    box-shadow: inset 2px 0 0 #ffffff, inset -2px 0 0 #ffffff;
    transform: scale(1.05);
    z-index: 1;
    position: relative;
  }

  /* Tippy popover theme */
  .tippy-box[data-theme~='color-copy'] {
    background: #ffffff;
    border: 1px solid #dddee1;
    border-radius: 10px;
    box-shadow: 0 4px 16px rgba(0,0,0,0.12);
    padding: 4px;
  }
  .tippy-box[data-theme~='color-copy'] .tippy-arrow {
    color: #ffffff;
  }
  .tippy-box[data-theme~='color-copy'] .tippy-arrow::before {
    border-bottom-color: #dddee1;
    top: -1px;
  }
  .color-copy-btn {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 12px;
    padding: 8px 12px;
    border: none;
    background: none;
    border-radius: 6px;
    cursor: pointer;
    width: 100%;
    text-align: left;
    font-family: 'Archivo', sans-serif;
  }
  .color-copy-btn:hover {
    background: #f8f8f8;
  }
  .color-copy-label {
    font-size: 12px;
    color: #6b6e76;
    font-weight: 500;
    flex-shrink: 0;
    width: 40px;
  }
  .color-copy-value {
    font-size: 12px;
    color: #292a2e;
    font-family: monospace;
  }
</style>
<script>
  function openLightbox(src) {
    var el = document.getElementById('docs-lightbox');
    if (!el) {
      el = document.createElement('div');
      el.id = 'docs-lightbox';
      el.className = 'lightbox-overlay';
      el.innerHTML = '<img />';
      el.addEventListener('click', function() { el.classList.remove('active'); });
      document.body.appendChild(el);
    }
    el.querySelector('img').src = src;
    el.classList.add('active');
  }
  document.addEventListener('keydown', function(e) {
    if (e.key === 'Escape') {
      var el = document.getElementById('docs-lightbox');
      if (el) el.classList.remove('active');
    }
  });


</script>
