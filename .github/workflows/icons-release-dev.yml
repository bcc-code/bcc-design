name: Icons Dev Release
run-name: Icons Release - dev release version

on:
  workflow_dispatch:

permissions:
  contents: read
  id-token: write  # Required for OIDC

env:
  CI: true

jobs:
  dev-build:
    runs-on: ubuntu-latest
    defaults:
      run:
        shell: bash
        working-directory: icons

    steps:
      - uses: actions/checkout@v6

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version-file: icons/.node-version
          registry-url: "https://registry.npmjs.org"
          cache: "pnpm"
          cache-dependency-path: icons/pnpm-lock.yaml
      
      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm build

      - name: Resolve version
        id: vars
        run: echo "sha_short=$(git rev-parse --short HEAD)" >> $GITHUB_ENV

      - name: Publish `@bcc-code/icons`
        run: |
          npm version 0.0.0-dev.${{ env.sha_short }} --force --no-git-tag-version
          pnpm publish --no-git-checks --tag dev

      - name: Publish `@bcc-code/icons-vue`
        working-directory: icons/vue
        run: |
          npm version 0.0.0-dev.${{ env.sha_short }} --force --no-git-tag-version
          pnpm publish --no-git-checks --tag dev
