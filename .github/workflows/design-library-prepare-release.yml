name: "Component Library: Prepare Release"

on:
  workflow_dispatch:

env:
  CI: true

permissions:
  contents: read

jobs:
  build:
    permissions:
      contents: write # for softprops/action-gh-release to create GitHub release

    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - run: git fetch --tags -f

      - name: Resolve version
        id: vars
        run: |
          if [ "${{ github.event_name }}" = "push" ]; then
            TAG_NAME="${{ github.ref_name }}"
          else
            TAG_NAME="$(git describe --tags --abbrev=0)"
          fi

          echo "TAG_NAME=$TAG_NAME" >> $GITHUB_OUTPUT

          RELEASE_DESCRIPTION="$(git tag -l --format='%(contents)' "$TAG_NAME" | sed '1,/^$/d')"
          {
            echo "RELEASE_DESCRIPTION<<EOF"
            echo "$RELEASE_DESCRIPTION"
            echo "EOF"
          } >> $GITHUB_OUTPUT

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          draft: false
          name: "component-library ${{ steps.vars.outputs.TAG_NAME }}"
          tag_name: ${{ steps.vars.outputs.TAG_NAME }}
          body: ${{ steps.vars.outputs.RELEASE_DESCRIPTION }}
          generate_release_notes: true
